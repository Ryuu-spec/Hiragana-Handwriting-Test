<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>히라가나 AI 트레이너 - あ행</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f7ff;
            height: 100%;
        }

        .jp-font { font-family: 'Klee One', 'Noto Sans JP', sans-serif; }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            align-items: stretch;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        .left-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            padding: 28px 28px 24px;
            background: #ffffff;
            gap: 16px;
        }

        .char-bar {
            display: flex;
            gap: 10px;
            padding-top: 10px;
        }

        .char-item {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 28px;
        }

        .score-badge {
            position: absolute;
            top: 0;
            background: #619bd1;
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 8px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(6px);
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(97,155,209,0.35);
            font-family: 'DM Mono', monospace;
        }
        .score-badge.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .score-badge.grade-a { background: #619bd1; }
        .score-badge.grade-b { background: #3a9e72; }
        .score-badge.grade-c { background: #f0a500; }
        .score-badge.grade-d { background: #e07a2f; }
        .score-badge.grade-e { background: #e05555; }

        .char-btn {
            width: 100%;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 600;
            border-radius: 16px;
            border: 2px solid #e8f0fe;
            background: #f8fbff;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Klee One', 'Noto Sans JP', sans-serif;
        }
        .char-btn:hover { border-color: #619bd1; color: #619bd1; }
        .char-btn.active {
            background: #619bd1;
            color: white;
            border-color: #619bd1;
            box-shadow: 0 8px 20px rgba(97,155,209,0.3);
        }

        .board-label {
            text-align: center;
            font-size: 9px;
            font-weight: 900;
            color: #cbd5e1;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .canvas-wrap {
            flex: 1;
            height: 0; /* flex가 실제 높이를 계산하도록 */
            min-height: 400px;
            position: relative;
            background: #ffffff;
            border: 2px solid #e8f0fe;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(97,155,209,0.05);
        }
        #guide-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        #drawing-canvas {
            position: relative; z-index: 2;
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            height: 100%;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }
        .btn-clear {
            flex: 1;
            padding: 16px;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 700;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-clear:hover { background: #e2e8f0; }
        .btn-score {
            flex: 1;
            padding: 16px;
            background: #619bd1;
            color: white;
            font-weight: 700;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(97,155,209,0.3);
        }
        .btn-score:hover { background: #5088bd; transform: translateY(-1px); }
        .btn-score:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .spinner.on { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .loading-steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
            width: 100%;
            max-width: 240px;
        }
        .loading-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #a0b4cc;
            opacity: 0;
            transition: opacity 0.4s, color 0.4s;
        }
        .loading-step.active {
            opacity: 1;
            color: #5b8fc9;
            animation: fadeInUp 0.4s ease;
            font-weight: 600;
        }
        .loading-step.done {
            opacity: 1;
            color: #7dc67e;
        }
        .step-icon { font-size: 15px; width: 20px; text-align: center; }
        .loading-bar-wrap {
            width: 100%;
            max-width: 240px;
            height: 4px;
            background: #dce8f5;
            border-radius: 99px;
            margin-top: 14px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #619bd1, #7dc67e);
            border-radius: 99px;
            transition: width 0.8s ease;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            flex: 0.85;
            display: flex;
            flex-direction: column;
            padding: 28px 28px 24px;
            background: #f1f7ff;
            border-left: 1px solid #e2eeff;
            gap: 16px;
            overflow-y: auto;
            /* 얇은 스크롤바 */
            scrollbar-width: thin;
            scrollbar-color: #c8d9ee transparent;
        }
        .right-panel::-webkit-scrollbar { width: 4px; }
        .right-panel::-webkit-scrollbar-track { background: transparent; }
        .right-panel::-webkit-scrollbar-thumb { background: #c8d9ee; border-radius: 99px; }

        .right-charbar-mirror {
            min-height: 100px;
            flex-shrink: 0;
        }

        .panel-label {
            font-size: 9px;
            font-weight: 900;
            color: #619bd1;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            text-align: center;
            flex-shrink: 0;
        }

        .result-card {
            flex: 1;
            min-height: 400px;
            background: white;
            border: 2px solid #e8f0fe;
            border-radius: 24px;
            box-shadow: inset 0 2px 10px rgba(97,155,209,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .empty-state {
            width: 100%;
            flex: 1;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .empty-circle {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2px dashed #c8d9ee;
            display: flex; align-items: center; justify-content: center;
            color: #c8d9ee; font-size: 26px; font-weight: 700;
        }
        .empty-text {
            font-size: 12px; color: #94a3b8;
            text-align: center; line-height: 1.8;
        }

        .result-view { display: none; width: 100%; padding: 16px 18px 18px; }
        .result-view.on { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .grade-display { text-align: center; }
        .grade-letter {
            font-size: 44px;
            font-weight: 900;
            line-height: 1;
            font-family: 'DM Mono', monospace;
        }
        .grade-letter.A { color: #619bd1; }
        .grade-letter.B { color: #3a9e72; }
        .grade-letter.C { color: #f0a500; }
        .grade-letter.D { color: #e07a2f; }
        .grade-letter.E { color: #e05555; }
        .score-num {
            font-family: 'DM Mono', monospace;
            font-size: 13px; color: #94a3b8; margin-top: 2px;
        }

        .rubric-list { width: 100%; display: flex; flex-direction: column; gap: 6px; }
        .rubric-item {}
        .rubric-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .rubric-name { font-size: 11px; font-weight: 700; color: #475569; }
        .rubric-val { font-family: 'DM Mono', monospace; font-size: 10px; color: #94a3b8; }
        .bar-bg { height: 5px; background: #e8f0fe; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

        .feedback-section { width: 100%; }
        .feedback-label {
            font-size: 9px; font-weight: 900; color: #619bd1;
            letter-spacing: 0.3em; text-transform: uppercase;
            margin-bottom: 8px;
        }
        .feedback-card {
            background: #f8fbff;
            border-left: 3px solid #619bd1;
            border-radius: 0 12px 12px 0;
            padding: 10px 12px;
            font-size: 12px;
            line-height: 1.75;
            color: #475569;
            word-break: keep-all;
            overflow-wrap: break-word;
            white-space: pre-line;
        }

        .right-btnrow-mirror {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(16px * 2 + 21px);
        }

        .error-log {
            font-size: 11px;
            color: #e05555;
            text-align: center;
        }

        .bottom-label {
            font-size: 9px;
            font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="app-container">

    <section class="left-panel">
        <div id="char-bar" class="char-bar jp-font"></div>
        <div class="board-label">Practice Board</div>
        <div class="canvas-wrap">
            <canvas id="guide-canvas"></canvas>
            <canvas id="drawing-canvas"></canvas>
        </div>
        <div class="btn-row">
            <button class="btn-clear" id="clear-btn">다시 쓰기</button>
            <button class="btn-score" id="score-btn">
                <span id="btn-text">채점하기</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </div>
    </section>

    <section class="right-panel">
        <div class="right-charbar-mirror"></div>
        <div class="panel-label">AI Analysis Result</div>

        <div class="result-card">
            <div class="empty-state" id="empty-state">
                <div class="empty-circle" id="empty-icon">?</div>
                <div class="empty-text" id="empty-text">히라가나를 작성한 후<br>채점 버튼을 눌러주세요.</div>
                <div class="loading-steps" id="loading-steps" style="display:none;">
                    <div class="loading-step" id="step-1"><span class="step-icon">✏️</span> 획 구조 분석 중...</div>
                    <div class="loading-step" id="step-2"><span class="step-icon">🔍</span> 필순·방향 검토 중...</div>
                    <div class="loading-step" id="step-3"><span class="step-icon">⚖️</span> 균형·비율 측정 중...</div>
                    <div class="loading-step" id="step-4"><span class="step-icon">📊</span> 최종 점수 계산 중...</div>
                </div>
                <div class="loading-bar-wrap" id="loading-bar-wrap" style="display:none;">
                    <div class="loading-bar-fill" id="loading-bar-fill"></div>
                </div>
            </div>

            <div class="result-view" id="result-view">
                <div class="grade-display">
                    <div class="grade-letter" id="grade-el">A</div>
                    <div class="score-num" id="score-el">92 / 100</div>
                </div>
                <div class="rubric-list" id="rubric-el"></div>
                <div class="feedback-section">
                    <div class="feedback-label">AI Feedback</div>
                    <div class="feedback-card" id="feedback-el"></div>
                </div>
            </div>
        </div>

        <div class="right-btnrow-mirror">
            <div class="error-log" id="error-log"></div>
        </div>
    </section>

</div>

<script>
const SERVER_URL = "https://hiragana-backend.vercel.app/api/score";

const CHARS = [
    {"char": "あ", "romaji": "a", "strokes": 3},
    {"char": "い", "romaji": "i", "strokes": 2},
    {"char": "う", "romaji": "u", "strokes": 2},
    {"char": "え", "romaji": "e", "strokes": 2},
    {"char": "お", "romaji": "o", "strokes": 3}
];

// ============================================================
// STROKE_RULES v2
// xDir/yDir: 획의 전체적인 진행 방향 벡터 (정규화 전)
//   - 원형·루프 획은 isLoop:true로 표시 → 방향 검사 대신 위치만 검사
// startRegion: 획 시작점이 캔버스 어느 영역에 있어야 하는지
//   - "top-left" | "top-center" | "top-right" | "center" | "center-left" 등
//   - 캔버스를 3x3 격자로 나눠 판단
// minLength: 획의 최소 길이 비율 (캔버스 대각선 대비, 0~1)
//   - 너무 짧은 획(점 처리) 걸러내기 위함
// ============================================================
const STROKE_RULES = {
    "あ": [
        // 1획: 좌상단에서 오른쪽으로 가로선 → 끝에서 아래왼쪽 갈고리
        { label: "1획", xDir: 1,    yDir: 0.1,  startRegion: "top-left",   isLoop: false, minLength: 0.15 },
        // 2획: 우측 상단에서 아래로 내려오다 왼쪽 아래로 크게 휘는 곡선
        { label: "2획", xDir: -0.3, yDir: 1,    startRegion: "top-center", isLoop: false, minLength: 0.3  },
        // 3획: 반시계 방향 타원 루프 — 방향보다 위치·크기가 중요
        { label: "3획", xDir: 0,    yDir: 0,    startRegion: "center",     isLoop: true,  minLength: 0.2  },
    ],
    "い": [
        // 1획: 오른쪽 아래 대각선 방향으로 기울어지며 내려옴 (수직 아님)
        { label: "1획", xDir: 0.35, yDir: 1,    startRegion: "top-left",   isLoop: false, minLength: 0.25 },
        // 2획: 오른쪽에서 짧게 아래로 내려오며 왼쪽 아래 곡선 마무리
        { label: "2획", xDir: -0.2, yDir: 1,    startRegion: "top-right",  isLoop: false, minLength: 0.15 },
    ],
    "う": [
        // 1획: 상단 중앙의 짧은 우하향 점 사선
        { label: "1획", xDir: 0.5,  yDir: 0.5,  startRegion: "top-center", isLoop: false, minLength: 0.05 },
        // 2획: 위로 살짝 올라가다 U자로 내려오며 왼쪽 위로 끝올림
        { label: "2획", xDir: -0.3, yDir: 0.5,  startRegion: "center",     isLoop: false, minLength: 0.3  },
    ],
    "え": [
        // 1획: 상단 짧은 우하향 사선 (수평선 아님 — xDir보다 yDir이 더 있음)
        { label: "1획", xDir: 0.6,  yDir: 0.4,  startRegion: "top-left",   isLoop: false, minLength: 0.08 },
        // 2획: 좌→우 가로 후 왼쪽 아래 꺾임 후 파도 마무리 → 전체 방향은 아래 왼쪽
        { label: "2획", xDir: -0.2, yDir: 0.8,  startRegion: "top-center", isLoop: false, minLength: 0.35 },
    ],
    "お": [
        // 1획: 수평 가로선
        { label: "1획", xDir: 1,    yDir: 0.05, startRegion: "top-left",   isLoop: false, minLength: 0.2  },
        // 2획: 세로로 내려오다 왼쪽으로 돌아 타원 루프
        { label: "2획", xDir: 0,    yDir: 0,    startRegion: "top-center", isLoop: true,  minLength: 0.3  },
        // 3획: 오른쪽 위의 짧은 사선
        { label: "3획", xDir: 0.5,  yDir: 0.5,  startRegion: "top-right",  isLoop: false, minLength: 0.05 },
    ],
};

// 캔버스를 3x3 격자로 나눠 startRegion 판정
function getRegion(x, y, canvasW, canvasH) {
    const col = x < canvasW * 0.38 ? 'left' : x < canvasW * 0.62 ? 'center' : 'right';
    const row = y < canvasH * 0.38 ? 'top'  : y < canvasH * 0.62 ? 'center' : 'bottom';
    return row === 'center' && col === 'center' ? 'center' : `${row}-${col}`;
}

// 획의 대표 방향 벡터 계산
// - 단순 시작→끝 벡터 대신 전체 포인트의 주성분 방향을 사용
function getStrokeDirection(pts) {
    if (pts.length < 2) return null;
    // 분산이 큰 방향(PCA 대신 간소화: 시작~끝 + 중간 샘플 평균)
    const samples = [0, Math.floor(pts.length * 0.25), Math.floor(pts.length * 0.5),
                     Math.floor(pts.length * 0.75), pts.length - 1];
    let dx = 0, dy = 0;
    for (let i = 1; i < samples.length; i++) {
        dx += pts[samples[i]].x - pts[samples[i-1]].x;
        dy += pts[samples[i]].y - pts[samples[i-1]].y;
    }
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) return null;
    return { nx: dx/len, ny: dy/len };
}

// 획의 총 길이 (픽셀)
function getStrokeLength(pts) {
    let len = 0;
    for (let i = 1; i < pts.length; i++) {
        const dx = pts[i].x - pts[i-1].x;
        const dy = pts[i].y - pts[i-1].y;
        len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
}

// ============================================================
// scoreStrokeOrder v2
// 항목별 점수:
//   획 개수 일치 여부  : 최대 8점
//   각 획 시작 위치    : 획당 최대 4점
//   각 획 방향        : 획당 최대 4점 (루프 획은 면제)
//   획 길이 최소 충족  : 획당 최대 2점
// 총 20점 만점으로 정규화
// ============================================================
function scoreStrokeOrder() {
    const rules   = STROKE_RULES[current.char];
    const MAX     = 20;

    if (!rules) {
        // 규칙 없으면 획 수만 검사
        const expected = current.strokes;
        if (strokes.length === expected) return MAX;
        return Math.max(0, MAX - Math.abs(strokes.length - expected) * 5);
    }

    const expected = rules.length;
    const dc = document.getElementById('drawing-canvas');
    const W  = dc.width;
    const H  = dc.height;
    const diagonal = Math.sqrt(W*W + H*H);

    // 획 수 틀리면 큰 감점 후 조기 반환
    if (strokes.length !== expected) {
        const diff = Math.abs(strokes.length - expected);
        return Math.max(0, MAX - diff * 6);
    }

    let rawScore = 0;
    const perStrokeMax = { count: 8 / expected, pos: 4, dir: 4, len: 2 };
    // 획 수 일치 기본 점수
    rawScore += 8;

    strokes.forEach((pts, i) => {
        const rule = rules[i];
        if (!rule || pts.length < 2) return;

        // ① 시작 위치 검사
        const startX = pts[0].x;
        const startY = pts[0].y;
        const actualRegion = getRegion(startX, startY, W, H);

        // region 매칭: 완전 일치 4점, 인접(행 또는 열 하나 차이) 2점, 불일치 0점
        const regionScore = scoreRegion(actualRegion, rule.startRegion);
        rawScore += regionScore; // max 4

        // ② 획 길이 검사
        const strokeLen = getStrokeLength(pts);
        const strokeRatio = strokeLen / diagonal;
        if (strokeRatio >= rule.minLength) {
            rawScore += 2; // 최소 길이 충족
        } else {
            rawScore += Math.round((strokeRatio / rule.minLength) * 2);
        }

        // ③ 방향 검사 (루프 획은 면제)
        if (!rule.isLoop) {
            const vec = getStrokeDirection(pts);
            if (vec) {
                const rLen = Math.sqrt(rule.xDir**2 + rule.yDir**2);
                if (rLen > 0.01) {
                    const dot = (vec.nx * rule.xDir/rLen) + (vec.ny * rule.yDir/rLen);
                    // dot: 1=완전 일치, 0=직각, -1=반대
                    // 0.7 이상 → 4점, 0.4~0.7 → 2점, 0~0.4 → 1점, 음수 → 0점
                    if      (dot >= 0.7) rawScore += 4;
                    else if (dot >= 0.4) rawScore += 2;
                    else if (dot >= 0.0) rawScore += 1;
                    // 음수(반대 방향)는 0점
                }
            }
        } else {
            // 루프 획은 방향 만점 부여 (위치와 크기로 이미 판단)
            rawScore += 4;
        }
    });

    // 최대 가능 점수: 8 + (4+2+4)*획수
    const maxRaw = 8 + (4 + 2 + 4) * expected;
    return Math.round(Math.min(MAX, (rawScore / maxRaw) * MAX));
}

// startRegion 매칭 점수 (0~4)
function scoreRegion(actual, expected) {
    if (actual === expected) return 4;

    // 인접 판단: row 또는 col 중 하나만 다른 경우
    const rows = { top: 0, center: 1, bottom: 2 };
    const cols = { left: 0, center: 1, right: 2 };

    function parse(r) {
        if (r === 'center') return { row: 1, col: 1 };
        const parts = r.split('-');
        if (parts.length === 1) return { row: rows[parts[0]] ?? 1, col: 1 };
        return { row: rows[parts[0]] ?? 1, col: cols[parts[1]] ?? 1 };
    }

    const a = parse(actual);
    const e = parse(expected);
    const dist = Math.abs(a.row - e.row) + Math.abs(a.col - e.col);
    if (dist === 1) return 2; // 인접
    return 0;                 // 멀리 벗어남
}

let current      = CHARS[0];
let strokes      = [];
let curStroke    = [];
let isDrawing    = false;
let isProcessing = false;
let hasDrawn     = false;
let charScores   = {};

window.addEventListener('DOMContentLoaded', () => {
    buildTabs();
    initCanvas();
    selectChar(CHARS[0]);
});

function buildTabs() {
    const bar = document.getElementById('char-bar');
    bar.innerHTML = '';
    CHARS.forEach(cd => {
        const item = document.createElement('div');
        item.className = 'char-item';
        const badge = document.createElement('div');
        badge.className = 'score-badge';
        badge.id = 'badge-' + cd.char;
        const btn = document.createElement('button');
        btn.className = 'char-btn' + (cd.char === current.char ? ' active' : '');
        btn.id = 'cbtn-' + cd.char;
        btn.textContent = cd.char;
        btn.onclick = () => { if (!isProcessing) selectChar(cd); };
        item.append(badge, btn);
        bar.appendChild(item);
    });
}

function selectChar(cd) {
    current = cd;
    document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('cbtn-' + cd.char);
    if (btn) btn.classList.add('active');
    clearCanvas();
    resetResult();
    drawGuide();
    if (charScores[cd.char]) showResult(charScores[cd.char]);
}

function initCanvas() {
    const dc   = document.getElementById('drawing-canvas');
    const gc   = document.getElementById('guide-canvas');
    const wrap = dc.parentElement;
    function resize() {
        const w = wrap.clientWidth;
        const h = wrap.clientHeight;
        dc.width = w; dc.height = h;
        gc.width = w; gc.height = h;
        clearDraw();
        drawGuide();
    }
    resize();
    new ResizeObserver(resize).observe(wrap);
    dc.addEventListener('mousedown',  e => startDraw(e));
    dc.addEventListener('mousemove',  e => contDraw(e));
    dc.addEventListener('mouseup',    () => endDraw());
    dc.addEventListener('mouseleave', () => endDraw());
    dc.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e.touches[0]); }, { passive: false });
    dc.addEventListener('touchmove',  e => { e.preventDefault(); contDraw(e.touches[0]); },  { passive: false });
    dc.addEventListener('touchend',   e => { e.preventDefault(); endDraw(); },                { passive: false });
}

function getXY(e) {
    const dc = document.getElementById('drawing-canvas');
    const r  = dc.getBoundingClientRect();
    return {
        x: (e.clientX - r.left) * (dc.width  / r.width),
        y: (e.clientY - r.top)  * (dc.height / r.height),
    };
}

function startDraw(e) {
    if (isProcessing) return;
    isDrawing = true; hasDrawn = true;
    curStroke = [getXY(e)];
}
function endDraw() {
    if (!isDrawing) return;
    isDrawing = false;
    if (curStroke.length > 1) strokes.push([...curStroke]);
    curStroke = [];
}
function contDraw(e) {
    if (!isDrawing || isProcessing) return;
    const pos = getXY(e);
    const dc  = document.getElementById('drawing-canvas');
    const ctx = dc.getContext('2d');
    if (curStroke.length) {
        const prev = curStroke[curStroke.length - 1];
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth   = 6;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.stroke();
    }
    curStroke.push(pos);
}

function clearDraw() {
    const dc = document.getElementById('drawing-canvas');
    dc.getContext('2d').clearRect(0, 0, dc.width, dc.height);
}

function clearCanvas() {
    clearDraw();
    strokes = []; curStroke = []; hasDrawn = false;
    document.getElementById('error-log').textContent = '';
}

function drawGuide() {
    const gc  = document.getElementById('guide-canvas');
    const ctx = gc.getContext('2d');
    ctx.clearRect(0, 0, gc.width, gc.height);
    ctx.setLineDash([6, 5]);
    ctx.strokeStyle = 'rgba(97,155,209,0.2)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, gc.height/2); ctx.lineTo(gc.width, gc.height/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gc.width/2, 0);  ctx.lineTo(gc.width/2, gc.height); ctx.stroke();
    ctx.setLineDash([]);
}

document.getElementById('score-btn').onclick = async () => {
    if (!hasDrawn) { document.getElementById('error-log').textContent = '글자를 먼저 써주세요.'; return; }
    if (isProcessing) return;

    isProcessing = true;
    const btn = document.getElementById('score-btn');
    btn.disabled = true;
    document.getElementById('btn-text').textContent = '채점 중...';
    document.getElementById('spinner').classList.add('on');
    document.getElementById('error-log').textContent = '';

    document.getElementById('empty-icon').textContent = '🤖';
    document.getElementById('empty-icon').style.fontSize = '26px';
    document.getElementById('empty-text').innerHTML = 'AI가 채점하고 있어요';
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('result-view').classList.remove('on');

    const steps = ['step-1','step-2','step-3','step-4'];
    const barFill = document.getElementById('loading-bar-fill');
    const barWrap = document.getElementById('loading-bar-wrap');
    const stepsEl = document.getElementById('loading-steps');
    stepsEl.style.display = 'flex';
    barWrap.style.display = 'block';
    barFill.style.width = '0%';

    let stepIndex = 0;
    const stepDurations = [3000, 5000, 4000, 99999];
    const barTargets = [20, 45, 70, 90];

    function activateStep(i) {
        if (i > 0) {
            document.getElementById(steps[i-1]).className = 'loading-step done';
            document.getElementById(steps[i-1]).querySelector('.step-icon').textContent = '✅';
        }
        if (i < steps.length) {
            document.getElementById(steps[i]).className = 'loading-step active';
            barFill.style.width = barTargets[i] + '%';
        }
    }

    activateStep(0);
    const stepTimers = [];
    let elapsed = 0;
    for (let i = 1; i < steps.length; i++) {
        elapsed += stepDurations[i-1];
        const t = setTimeout(() => activateStep(i), elapsed);
        stepTimers.push(t);
    }

    // ★ 필순 점수를 클라이언트에서 계산 (stroke 데이터 활용)
    const strokeOrderScore = scoreStrokeOrder();
    const imgB64 = getImageData();

    try {
        const res = await fetch(SERVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                target:    current.char,
                imageData: imgB64,
                // 백엔드에도 stroke 메타 정보 전달 (향후 활용 가능)
                strokeMeta: {
                    count: strokes.length,
                    expected: (STROKE_RULES[current.char] || []).length || current.strokes,
                }
            })
        });
        if (!res.ok) throw new Error('서버 오류');
        const data = await res.json();

        stepTimers.forEach(t => clearTimeout(t));
        steps.forEach((s) => {
            const el = document.getElementById(s);
            el.className = 'loading-step done';
            el.querySelector('.step-icon').textContent = '✅';
        });
        barFill.style.width = '100%';

        const total = data.score;
        const r = {
            total,
            grade: total >= 90 ? 'A' : total >= 80 ? 'B' : total >= 70 ? 'C' : total >= 60 ? 'D' : 'E',
            scores: {
                '형태정확성': data.형태정확성 ?? 0,
                '필순':       strokeOrderScore,   // ★ 클라이언트 계산값 사용
                '획방향':     data.획방향 ?? 0,
                '끝맺음':     data.끝맺음 ?? 0,
                '균형비율':   data.균형비율 ?? 0,
            },
            overall: data.feedback,
        };
        charScores[current.char] = r;
        setTimeout(() => showResult(r), 500);

    } catch(err) {
        stepTimers.forEach(t => clearTimeout(t));
        document.getElementById('error-log').textContent = '연결이 지연되고 있습니다. 다시 시도해주세요.';
    } finally {
        isProcessing = false;
        btn.disabled = false;
        document.getElementById('btn-text').textContent = '채점하기';
        document.getElementById('spinner').classList.remove('on');
        document.getElementById('empty-icon').textContent = '?';
        document.getElementById('empty-icon').style.fontSize = '';
        document.getElementById('empty-text').innerHTML = '히라가나를 작성한 후<br>채점 버튼을 눌러주세요.';
        stepsEl.style.display = 'none';
        barWrap.style.display = 'none';
        barFill.style.width = '0%';
        steps.forEach(s => { document.getElementById(s).className = 'loading-step'; });
    }
};

document.getElementById('clear-btn').onclick = () => {
    clearCanvas();
    resetResult();
};

function getImageData() {
    const dc = document.getElementById('drawing-canvas');
    const tmp = document.createElement('canvas');
    tmp.width = 300; tmp.height = 300;
    const tCtx = tmp.getContext('2d');
    tCtx.fillStyle = 'white';
    tCtx.fillRect(0, 0, 300, 300);
    tCtx.drawImage(dc, 0, 0, 300, 300);
    return tmp.toDataURL('image/jpeg', 0.7).split(',')[1];
}

function showResult(r) {
    document.getElementById('empty-state').style.display = 'none';
    const rv = document.getElementById('result-view');
    rv.classList.add('on');

    const gradeEl = document.getElementById('grade-el');
    gradeEl.textContent = r.grade;
    gradeEl.className   = 'grade-letter ' + r.grade;
    document.getElementById('score-el').textContent = r.total + ' / 100';

    const badge = document.getElementById('badge-' + current.char);
    if (badge) {
        badge.textContent = r.total + '점';
        badge.className = 'score-badge visible grade-' + r.grade.toLowerCase();
    }

    const rubrics = [
        { name: '형태 정확성', key: '형태정확성', max: 40, color: '#2b5aad' },
        { name: '필순',        key: '필순',       max: 20, color: '#c9a84c' },
        { name: '획 방향',     key: '획방향',     max: 20, color: '#619bd1' },
        { name: '끝맺음',      key: '끝맺음',     max: 10, color: '#3a9e72' },
        { name: '균형·비율',   key: '균형비율',   max: 10, color: '#f0a500' },
    ];
    document.getElementById('rubric-el').innerHTML = rubrics.map(rb => {
        const sc  = r.scores?.[rb.key] ?? 0;
        const pct = Math.min(100, Math.round((sc / rb.max) * 100));
        return `<div class="rubric-item">
          <div class="rubric-row">
            <span class="rubric-name">${rb.name}</span>
            <span class="rubric-val">${sc} / ${rb.max}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${rb.color}"></div></div>
        </div>`;
    }).join('');

    document.getElementById('feedback-el').textContent = r.overall || '';
}

function resetResult() {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('result-view').classList.remove('on');
}
</script>
